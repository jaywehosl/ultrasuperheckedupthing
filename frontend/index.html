<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      /* Boot splash: shown ONLY right after a panel restart (gated on the
         uup.bootBusy flag) so the browser reload doesn't flash a blank page
         before React mounts. Single light theme → solid panel background. The
         React BusyOverlay takes over once mounted; BusyOverlayProvider removes
         this node. */
      #boot-splash {
        position: fixed; inset: 0; z-index: 99999; display: none;
        align-items: center; justify-content: center; background: #f8f9fc;
      }
      #boot-splash.is-on { display: flex; }
      #boot-splash .bs-ring {
        width: 60px; height: 60px; border-radius: 50%;
        border: 4px solid rgba(50, 121, 249, 0.18); border-top-color: #3279f9;
        animation: bs-spin 0.85s linear infinite;
      }
      @keyframes bs-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="message"></div>
    <div id="boot-splash"><div class="bs-ring"></div></div>
    <script>
      (function () {
        try {
          if (!localStorage.getItem('uup.bootBusy')) return;
          document.getElementById('boot-splash').classList.add('is-on');
          // Safety: if React never mounts the overlay provider (e.g. a redirect
          // to login), don't leave the splash stuck.
          setTimeout(function () {
            var el = document.getElementById('boot-splash');
            if (el) el.remove();
            try { localStorage.removeItem('uup.bootBusy'); } catch (e) {}
          }, 8000);
        } catch (e) { /* localStorage unavailable */ }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
